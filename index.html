<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2016 政治獻金資料庫</title>
    <link rel="stylesheet" href="style.css" />
    <!-- PapaParse：用於解析同資料夾 2016.csv -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  </head>
  <body>
    <div class="cosmic-bg" aria-hidden="true"></div>

    <header class="hero container">
      <div class="floating-layer" aria-hidden="true">
        <span class="orb orb-dpp"></span>
        <span class="orb orb-kmt"></span>
        <span class="orb orb-other"></span>
        <span class="coin c1"></span>
        <span class="coin c2"></span>
        <span class="coin c3"></span>
        <span class="node n1"></span>
        <span class="node n2"></span>
        <span class="node n3"></span>
      </div>

      <p class="kicker">Political Moneyverse Portal</p>
      <h1>2016 政治獻金資料庫</h1>
      <p class="subtitle">一場選舉，不只由選票決定，也由金流推動。</p>

      <section class="search-cta glass reveal">
        <div class="search-box">
          <input
            id="searchInput"
            type="text"
            placeholder="搜尋候選人、政黨、選區、委員會……"
            aria-label="搜尋候選人、政黨、選區、委員會"
          />
          <button id="searchBtn" class="shine-btn">揭開金流</button>
        </div>

        <div class="filter-bar">
          <select id="cityFilter" aria-label="縣市篩選">
            <option value="">全部縣市</option>
          </select>
          <select id="partyFilter" aria-label="政黨篩選">
            <option value="">全部政黨</option>
          </select>
          <select id="donationFilter" aria-label="獻金分類篩選">
            <option value="">全部獻金分類</option>
            <option value="personalIncome">個人捐贈收入</option>
            <option value="businessIncome">營利事業捐贈收入</option>
            <option value="partyDonationIncome">政黨捐贈收入</option>
            <option value="groupDonationIncome">人民團體捐贈收入</option>
            <option value="anonymousDonationIncome">匿名捐贈收入</option>
            <option value="otherIncome">其他收入</option>
            <option value="overThirtyThousandIncome">超過三萬元之收入</option>
          </select>
        </div>

        <div id="exampleChips" class="chips" aria-label="範例查詢"></div>
      </section>
    </header>

    <main class="container">
      <section class="section-block">
        <h2>Quick Summary</h2>
        <div id="summaryGrid" class="summary-grid"></div>
      </section>

      <section class="section-block">
        <h2>台灣五大區霓虹分區面板</h2>
        <div id="regionGrid" class="region-grid"></div>
      </section>

      <section class="section-block">
        <h2>Editor’s Picks</h2>
        <div id="picksGrid" class="picks-grid"></div>
      </section>

      <section class="section-block">
        <div class="results-header">
          <h2>Results List</h2>
          <label class="sort-wrap" for="sortSelect">
            Ranking
            <select id="sortSelect">
              <option value="income">總收入高到低</option>
              <option value="votes">得票數高到低</option>
              <option value="voteRate">得票率高到低</option>
              <option value="companyCount">捐贈企業數高到低</option>
              <option value="personalRate">個人捐贈比例高到低</option>
              <option value="businessRate">營利事業捐贈比例高到低</option>
            </select>
          </label>
        </div>

        <p id="activeFilterText" class="active-filter">目前篩選：全部資料</p>
        <div id="resultsList" class="results-grid"></div>
        <div class="load-wrap">
          <button id="loadMoreBtn" class="shine-btn">載入更多</button>
          <p id="allLoadedMsg" class="all-loaded" hidden>所有金流線索已展開</p>
        </div>
      </section>
    </main>

    <template id="resultCardTemplate">
      <article class="result-card glass reveal">
        <div class="card-top">
          <h3 class="name"></h3>
          <span class="party-badge"></span>
        </div>
        <p class="district"></p>
        <div class="stats"></div>
        <div class="donation-highlight" hidden></div>
        <span class="winner-tag" hidden>當選</span>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
